<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>YBD Offline</title>
    <style>
      body {
        margin: 0;
        min-height: 100vh;
        display: grid;
        place-items: center;
        font-family: 'Trebuchet MS', 'Segoe UI', sans-serif;
        color: #20190f;
        background: linear-gradient(135deg, #f2f1e9, #efe3c5);
      }

      main {
        width: min(560px, calc(100vw - 2rem));
        border: 1px solid #dccfb9;
        border-radius: 16px;
        background: #fffaf0;
        padding: 1.25rem;
      }

      h1 {
        font-family: Georgia, 'Times New Roman', serif;
        margin: 0 0 0.5rem;
      }

      p {
        margin: 0.5rem 0;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <main>
      <h1>You're offline</h1>
      <p>The app shell is available, but real-time multiplayer needs an internet connection.</p>
      <p>Reconnect and refresh to continue with host/join gameplay in later releases.</p>
    </main>
  </body>
</html>
